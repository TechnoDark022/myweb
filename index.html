<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechnoDark022</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Custom cursor (PC only) -->
    <div class="cursor"></div>
    <div class="cursor-dot"></div>

    <!-- Background -->
    <div class="background"></div>

    <!-- Music button -->
    <button class="music-btn" id="musicBtn">🎵 Play Music</button>

    <!-- Main card -->
    <div class="card">
        <img src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Profile" class="avatar">
        
        <h1>TechnoDark022</h1>
        <p class="bio">✨ Developer | Creator | Gamer ✨</p>
        
        <div class="divider"></div>
        
        <div class="section">
            <h2>📝 About Me</h2>
            <p>I build cool stuff on the internet. Welcome to my space! 🚀</p>
        </div>
        
        <div class="section">
            <h2>💻 Skills</h2>
            <div class="skills">
                <span>React</span>
                <span>Next.js</span>
                <span>Node.js</span>
                <span>Python</span>
                <span>UI/UX</span>
                <span>Discord.js</span>
            </div>
        </div>
        
        <div class="section">
            <h2>🔗 Connect</h2>
            <div class="links">
                <a href="https://github.com" target="_blank">GitHub</a>
                <a href="https://twitter.com" target="_blank">Twitter</a>
                <a href="https://discord.com" target="_blank">Discord</a>
                <a href="https://youtube.com" target="_blank">YouTube</a>
            </div>
        </div>
        
        <button class="hello-btn" onclick="alert('Thanks for visiting! 🎉')">Say Hello 👋</button>
        
        <footer>© 2026 TechnoDark022 | Made with ❤️</footer>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
